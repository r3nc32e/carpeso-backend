# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/CarpesoDB
spring.datasource.username=postgres
spring.datasource.password=admin123

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server
server.port=8080
server.ssl.enabled=false

# JWT
jwt.secret=carpeso-super-secret-key-2024-secure-carpeso!!
jwt.expiration=604800000

# Session timeout (30 minutes)
jwt.session.timeout=1800000

# Encryption key (AES-256)
encryption.secret.key=CarpAES256Key2024SecureEncryptKey

# Mail (for OTP) - i-configure mo later
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Circular references
spring.main.allow-circular-references=true

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

